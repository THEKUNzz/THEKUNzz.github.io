short_bio_text_justify: false
short_bio: >-
  <div data-lang="zh">
    <p>
      你好，我是姚甲涛，也使用英文名 Triton Yao。我于西北农林科技大学（NWAFU）完成软件工程本科与计算机科学硕士阶段学习。
      我的兴趣集中在大模型智能体、多智能体系统、强化学习，以及计算机图形学中的离线渲染。
    </p>
    <p>
      近期我关注能真正落地的 LLM 研究工具、面向论文阅读与推理的智能体工作流，以及连接感知、决策和生成的学习系统。
    </p>
  </div>
  <div data-lang="en">
    <p>
      I am Triton Yao, also known as jtyao. I received my B.S. in Software Engineering and M.S. training in Computer Science
      at Northwest A&F University (NWAFU). My work explores large language model agents, multi-agent systems,
      reinforcement learning, and offline rendering in computer graphics.
    </p>
    <p>
      I am currently interested in practical LLM-powered research tools, agentic workflows for reading and reasoning,
      and learning-based systems that connect perception, decision-making, and generation.
    </p>
  </div>

