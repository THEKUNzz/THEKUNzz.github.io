short_bio: >-
  <p>
    <strong>中文：</strong>你好，我是姚甲涛，也使用英文名 Triton Yao。我于西北农林科技大学（NWAFU）
    完成计算机科学本科与硕士阶段学习。我的兴趣集中在大模型智能体、多智能体系统、强化学习，以及计算机图形学中的离线渲染。
  </p>
  <p>
    <strong>English:</strong> I am Triton Yao, also known as jtyao. I received both my B.S. and M.S. training in
    Computer Science at Northwest A&F University (NWAFU). My work explores large language model agents,
    multi-agent systems, reinforcement learning, and offline rendering in computer graphics.
  </p>
  <p>
    <strong>Current Focus / 近期关注：</strong> building practical LLM-powered research tools, agentic workflows for
    reading and reasoning, and learning-based systems that connect perception, decision-making, and generation.
  </p>

