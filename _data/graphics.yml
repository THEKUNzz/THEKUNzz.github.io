title_en: "Graphics Research"
title_zh: "图形学研究"
name_en: "B-SplineCV: B-spline Regression Control Variates for Monte Carlo Rendering"
name_zh: "B-SplineCV：面向蒙特卡洛离线渲染的 B 样条回归控制变量"
summary_en: >-
  My master's thesis studies variance reduction for offline Monte Carlo rendering. B-SplineCV constructs a bicubic
  B-spline regression surface as a control variate, captures nonlinear local illumination distributions more stably
  than polynomial CVLS, and accelerates the sparse fitting system with Cholesky and LSQR solvers.
summary_zh: >-
  我的硕士论文研究离线蒙特卡洛渲染中的方差缩减问题。B-SplineCV 使用双三次 B 样条回归曲面构造控制变量，
  相比多项式 CVLS 更稳定地拟合复杂局部光强分布，并通过 Cholesky 与 LSQR 求解器加速稀疏拟合系统。
tags:
  - Offline Rendering
  - Monte Carlo Integration
  - B-Spline Regression
  - Control Variates
  - PBRT-V3
